<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Docker</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f6efe8, #d9e7ff);
        color: #1f2937;
        font-family: "Segoe UI", sans-serif;
      }

      main {
        max-width: 720px;
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.15);
      }

      h1 {
        margin-top: 0;
        font-size: 2.4rem;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.7;
      }

      code {
        padding: 2px 8px;
        border-radius: 999px;
        background: #e5eefc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello Docker</h1>
      <p>Neu ban dang thay trang nay, nghia la image ban build da chay ngon lanh canh dao.</p>
      <p>Thu sua file <code>index.html</code>, build lai image, va xem ket qua thay doi.</p>
    </main>
  </body>
</html>
